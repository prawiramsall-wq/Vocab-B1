<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vocabulary Challenge</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#eaf4ff,#f7fbff);
padding:40px 20px;
}

.container{
max-width:1100px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:35px;
}

.header h1{
font-size:42px;
color:#0a4d8f;
margin-bottom:10px;
}

.header p{
color:#5d7288;
font-size:18px;
}

.quiz-card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.question{
display:flex;
gap:25px;
align-items:center;
flex-wrap:wrap;
}

.question img{
width:170px;
height:170px;
object-fit:contain;
background:white;
border-radius:15px;
border:3px solid #d8e9ff;
padding:10px;
}

.question-content{
flex:1;
}

.question-number{
font-size:18px;
font-weight:700;
color:#0a4d8f;
margin-bottom:10px;
}

input{
width:100%;
padding:14px;
font-size:16px;
border:2px solid #cfe2ff;
border-radius:12px;
transition:.3s;
}

input:focus{
outline:none;
border-color:#0a66c2;
}

.answer{
margin-top:10px;
font-weight:700;
display:none;
}

.correct{
color:#198754;
}

.wrong{
color:#dc3545;
}

button{
display:block;
margin:35px auto;
padding:16px 40px;
font-size:18px;
font-weight:700;
border:none;
border-radius:14px;
background:#0a66c2;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#084d93;
}

.result-box{
display:none;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
text-align:center;
margin-top:30px;
}

.score{
font-size:60px;
font-weight:bold;
color:#0a66c2;
margin:10px 0;
}

.percentage{
font-size:24px;
color:#0a4d8f;
}

.badge{
margin-top:15px;
font-size:22px;
font-weight:bold;
}

.footer{
margin-top:20px;
color:#666;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>Beginner Vocabulary Challenge</h1>
<p>Look at each picture and type the correct English word.</p>
</div>

<form id="quizForm"></form>

<button onclick="checkAnswers()">Submit Answers</button>

<div class="result-box" id="resultBox">
<h2>Your Score</h2>
<div class="score" id="score"></div>
<div class="percentage" id="percentage"></div>
<div class="badge" id="badge"></div>
<div class="footer">Great job! Review the correct answers below.</div>
</div>

</div>

<script>

const questions = [

{img:"images/pencil.png",answer:"pencil"},
{img:"images/pen.png",answer:"pen"},
{img:"images/book.png",answer:"book"},
{img:"images/ruler.png",answer:"ruler"},
{img:"images/eraser.png",answer:"eraser"},

{img:"images/cat.png",answer:"cat"},
{img:"images/dog.png",answer:"dog"},
{img:"images/bird.png",answer:"bird"},
{img:"images/fish.png",answer:"fish"},
{img:"images/cow.png",answer:"cow"},

{img:"images/chair.png",answer:"chair"},
{img:"images/table.png",answer:"table"},
{img:"images/lamp.png",answer:"lamp"},
{img:"images/bed.png",answer:"bed"},
{img:"images/clock.png",answer:"clock"}

];

const form = document.getElementById("quizForm");

questions.forEach((q,index)=>{

form.innerHTML += `

<div class="quiz-card">

<div class="question">

<img src="${q.img}" alt="${q.answer}">

<div class="question-content">

<div class="question-number">
Question ${index+1}
</div>

<input
type="text"
id="q${index}"
placeholder="Type your answer here">

<div class="answer" id="answer${index}"></div>

</div>

</div>

</div>

`;

});

function checkAnswers(){

let score = 0;

questions.forEach((q,index)=>{

const userAnswer =
document
.getElementById(`q${index}`)
.value
.trim()
.toLowerCase();

const answerBox =
document.getElementById(`answer${index}`);

if(userAnswer === q.answer){

score++;

answerBox.innerHTML =
`✓ Correct! Answer: ${q.answer}`;

answerBox.className =
"answer correct";

}else{

answerBox.innerHTML =
`✗ Correct Answer: ${q.answer}`;

answerBox.className =
"answer wrong";

}

answerBox.style.display = "block";

});

const percent =
Math.round((score/questions.length)*100);

document.getElementById("score")
.innerHTML =
`${score} / ${questions.length}`;

document.getElementById("percentage")
.innerHTML =
`${percent}%`;

let badge = "";

if(percent >= 90){
badge = "🏆 Excellent!";
}
else if(percent >= 70){
badge = "🥈 Great Work!";
}
else if(percent >= 50){
badge = "👍 Keep Practicing!";
}
else{
badge = "📚 Try Again!";
}

document.getElementById("badge")
.innerHTML = badge;

document.getElementById("resultBox")
.style.display = "block";

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

</script>

</body>
</html>
